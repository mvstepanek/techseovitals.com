{{ define "main" }}
<main id="main" class="focus:outline-none" tabindex="-1">
  <article>
    <!-- Header -->
    <header class="section-sm bg-gray-50">
      <div class="container-custom">
        <div class="max-w-4xl mx-auto text-center">
          <!-- Title -->
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-gray-900 mb-6 leading-tight">
            {{ .Title }}
          </h1>
          
          <!-- Description -->
          {{- if .Description }}
          <p class="text-xl text-gray-600 leading-relaxed mb-8 max-w-3xl mx-auto">
            {{ .Description }}
          </p>
          {{- end }}
        </div>
      </div>
    </header>

    <!-- Content -->
    <div class="section bg-white">
      <div class="container-custom">
        <div class="max-w-4xl mx-auto">
          <div class="prose prose-lg max-w-none">
            {{ .Content }}
          </div>
        </div>
      </div>
    </div>
  </article>

  <!-- CTA Section -->
  {{ partial "sections/final-cta-section.html" . }}
</main>
{{ end }}
