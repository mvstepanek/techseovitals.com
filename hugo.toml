baseURL = "https://www.techseovitals.com"
languageCode = "en-US"
title = "TechSEO Vitals - Technical SEO & Web Performance Consultant"
# theme = ""
publishDir = "public"

# Hugo v0.150.0 specific configurations
enableGitInfo = true
enableRobotsTXT = true
enableEmoji = true

# Performance and optimization
minify.tdewolff.html.keepWhitespace = false
minify.tdewolff.html.keepEndTags = true
minify.tdewolff.css.precision = 0
minify.tdewolff.js.precision = 0

# Security
security.enableInlineShortcodes = true
security.funcs.getenv = ["^HUGO_", "^CI$"]

# Asset processing
assetDir = "assets"

# Build configuration
build.writeStats = true
build.cacheBusters = [
  {source = "assets/watching/hugo_stats\\.json", target = "styles\\.css"},
  {source = "(postcss|tailwind)\\.config\\.js", target = "css"},
  {source = "assets/.*\\.(js|ts|jsx|tsx)", target = "js"},
  {source = "assets/.*\\.(.*)$", target = "$1"},
]

# Content configuration
contentDir = "content"
dataDir = "data"
layoutDir = "layouts"
staticDir = "static"

# SEO and markup
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      hardWraps = false
      xhtml = false
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
      wrapStandAloneImageWithinParagraph = true
      attribute.block = false
      attribute.title = true
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true

  [markup.highlight]
    style = "github"
    lineNos = true
    codeFences = true
    guessSyntax = true
    anchorLineNos = false
    lineNumbersInTable = true
    noClasses = false
    tabWidth = 2

  [markup.tableOfContents]
    endLevel = 6
    ordered = false
    startLevel = 2

# URL management
[permalinks]
  blog = "/blog/:slug/"
  pages = "/:slug/"

# Sitemap configuration
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.8

# RSS configuration
[services]
  [services.rss]
    limit = 20

# Image processing
[imaging]
  resampleFilter = "CatmullRom"
  quality = 85
  anchor = "smart"

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"

# Menu configuration
[menus]
  [[menus.main]]
    name = "Services"
    url = "/technical-seo-services/"
    weight = 10
    
  [[menus.main]]
    name = "About"
    url = "/technical-seo-consultant/"
    weight = 20
    
  [[menus.main]]
    name = "Blog"
    url = "/blog/"
    weight = 30
    
  [[menus.main]]
    name = "Resources"
    url = "/technical-seo-checklist/"
    weight = 40
    
  [[menus.main]]
    name = "Contact"
    url = "/contact/"
    weight = 50

  [[menus.footer]]
    name = "Privacy Policy"
    url = "/privacy-policy/"
    weight = 10
    
  [[menus.footer]]
    name = "Terms and Conditions"
    url = "/terms-and-conditions/"
    weight = 20

# Site parameters
[params]
  description = "Expert Technical SEO consultant specializing in Core Web Vitals, page speed optimization, and search rankings. Get faster websites that rank higher in Google."
  author = "Martin Stepanek"
  email = "hello@techseovitals.com"
  
  # SEO
  keywords = "technical SEO consultant, core web vitals, page speed optimization, website performance, SEO audit, search rankings"
  
  # Social media
  twitter = "techseovitals"
  linkedin = "martin-stepanek-techseo"
  youtube = "@techseovitals"
  
  # Images
  logo = "/images/logos/logo-light.svg"
  favicon = "/favicon.ico"
  ogImage = "/images/og-default.jpg"
  
  # Analytics and tracking
  googleAnalytics = ""
  googleTagManager = ""
  
  # Performance
  preloadFonts = true
  lazyImages = true
  
  # Schema.org structured data
  [params.schema]
    type = "ProfessionalService"
    name = "TechSEO Vitals"
    description = "Technical SEO and Web Performance consulting services to help businesses improve search rankings and website speed."
    founder = "Martin Stepanek"
    areaServed = "Worldwide"
    
  # Contact information
  [params.contact]
    email = "hello@techseovitals.com"
    phone = ""
    address = ""
    
  # Social proof
  [params.socialProof]
    businessesHelped = "50+"
    yearsExperience = "10+"
    newsletterSubscribers = "250+"

# Module configuration for advanced features
[module]
  [module.hugoVersion]
    extended = false
    min = "0.150.0"