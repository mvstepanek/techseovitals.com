<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tech text -->
  <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#gradient-light)">Tech</text>
  
  <!-- SEO text -->
  <text x="50" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">SEO</text>
  
  <!-- Vitals text -->
  <text x="0" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#6b7280">Vitals</text>
  
  <!-- Performance indicator -->
  <circle cx="180" cy="25" r="8" fill="#10b981"/>
  <text x="176" y="29" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✓</text>
</svg>