<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tech text -->
  <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#gradient-dark)">Tech</text>
  
  <!-- SEO text -->
  <text x="50" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">SEO</text>
  
  <!-- Vitals text -->
  <text x="0" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#d1d5db">Vitals</text>
  
  <!-- Performance indicator -->
  <circle cx="180" cy="25" r="8" fill="#10b981"/>
  <text x="176" y="29" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✓</text>
